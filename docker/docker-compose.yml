services:
  # ─────────────────────────────────────────────
  # PermaClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm permaclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  permaclaw-agent:
    # Use a published PermaClaw image; if you build locally, comment out `image` and uncomment `build`.
    image: docker.io/aostore/permaclaw:latest
    container_name: permaclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.permaclaw
    entrypoint: ["permaclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PermaClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  permaclaw-gateway:
    image: docker.io/aostore/permaclaw:latest
    container_name: permaclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.permaclaw

  # ─────────────────────────────────────────────
  # PermaClaw Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  permaclaw-launcher:
    image: docker.io/aostore/permaclaw:launcher
    container_name: permaclaw-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - PERMACLAW_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.permaclaw