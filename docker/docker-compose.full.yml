services:
  # ─────────────────────────────────────────────
  # PermaClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm permaclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  permaclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: permaclaw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.permaclaw/config.json:ro
      - permaclaw-workspace:/root/.permaclaw/workspace
      - permaclaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["permaclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PermaClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  permaclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: permaclaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.permaclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - permaclaw-workspace:/root/.permaclaw/workspace
      # NPM cache for faster MCP server installs
      - permaclaw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  permaclaw-workspace:
  permaclaw-npm-cache: # Cache npm packages to speed up MCP server installations